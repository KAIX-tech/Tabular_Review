# Docker Compose automatically loads .env file in the same directory
# Edit .env file to configure environment variables

services:
  # Backend service for document processing
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tabular-review-backend
    restart: unless-stopped
    ports:
      - "18001:8000"
    environment:
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
      - VITE_API_URL=${VITE_API_URL:-http://10.10.190.4:18001}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://10.10.190.10:15006/v1}
      - VLLM_API_KEY=${VLLM_API_KEY:-EMPTY}
      - VLLM_MODEL=${VLLM_MODEL:-glm-5}
      - VLLM_TIMEOUT_SECONDS=${VLLM_TIMEOUT_SECONDS:-120}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5173,http://10.10.190.4:13001}
      - DOCLING_OCR_ENABLED=${DOCLING_OCR_ENABLED:-true}
      - DOCLING_OCR_FORCE_FULL_PAGE=${DOCLING_OCR_FORCE_FULL_PAGE:-false}
      - DOCLING_OCR_LANGS=${DOCLING_OCR_LANGS:-eng,kor}
      - DOCLING_HF_DISABLE_SSL_VERIFY=${DOCLING_HF_DISABLE_SSL_VERIFY:-true}
      - DOCLING_HF_TRUST_ENV=${DOCLING_HF_TRUST_ENV:-false}
    networks:
      - tabular-review-network

  # Frontend service for React application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://10.10.190.4:18001}
        VITE_LLM_MODEL: ${VITE_LLM_MODEL:-glm-5}
        VITE_LLM_TIMEOUT_MS: ${VITE_LLM_TIMEOUT_MS:-120000}
    container_name: tabular-review-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "13001:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://10.10.190.4:18001}
      - VITE_LLM_MODEL=${VITE_LLM_MODEL:-glm-5}
      - VITE_LLM_TIMEOUT_MS=${VITE_LLM_TIMEOUT_MS:-120000}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - tabular-review-network

networks:
  tabular-review-network:
    driver: bridge
