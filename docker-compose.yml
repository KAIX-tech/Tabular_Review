# Docker Compose automatically loads .env file in the same directory
# Edit .env file to configure environment variables

services:
  # Backend service for document processing
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tabular-review-backend
    restart: unless-stopped
    ports:
      - "18001:8000"
    environment:
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      - VITE_API_URL=${VITE_API_URL}
      - VLLM_BASE_URL=${VLLM_BASE_URL}
      - VLLM_API_KEY=${VLLM_API_KEY}
      - VLLM_MODEL=${VLLM_MODEL}
      - VLLM_TIMEOUT_SECONDS=${VLLM_TIMEOUT_SECONDS}
      - CORS_ORIGINS=${CORS_ORIGINS}
    networks:
      - tabular-review-network

  # Frontend service for React application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_LLM_MODEL: ${VITE_LLM_MODEL}
        VITE_LLM_TIMEOUT_MS: ${VITE_LLM_TIMEOUT_MS}
    container_name: tabular-review-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "13001:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_LLM_MODEL=${VITE_LLM_MODEL}
      - VITE_LLM_TIMEOUT_MS=${VITE_LLM_TIMEOUT_MS}
      - NODE_ENV=${NODE_ENV}
    networks:
      - tabular-review-network

networks:
  tabular-review-network:
    driver: bridge
