# Docker Compose automatically loads the .env file in this directory.
# Copy .env.example to .env and adjust values before running.

services:
  # Database: PostgreSQL 16 with the pgvector extension (embeddings, BGE-M3 1024d).
  db:
    image: pgvector/pgvector:pg16
    container_name: tabular-review-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-kalex}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kalex}
      - POSTGRES_DB=${POSTGRES_DB:-kalex}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kalex} -d ${POSTGRES_DB:-kalex}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tabular-review-network

  # Object storage: MinIO (S3-compatible) for original uploaded files.
  minio:
    image: minio/minio:latest
    container_name: tabular-review-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-kalex}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-kalexsecret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tabular-review-network

  # Backend: FastAPI + Docling document conversion + vLLM proxy.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tabular-review-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "18002:8000"
    environment:
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
      - PYTHONIOENCODING=${PYTHONIOENCODING:-utf-8}
      - LANG=${LANG:-C.UTF-8}
      - LC_ALL=${LC_ALL:-C.UTF-8}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://kalex:kalex@db:5432/kalex}
      # AI provider + Gemini (dev embedding/generation)
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-1024}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      - GEMINI_LLM_MODEL=${GEMINI_LLM_MODEL:-gemini-2.5-flash}
      # Object storage (MinIO); endpoint is the internal compose hostname
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-kalex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-kalexsecret}
      - MINIO_BUCKET=${MINIO_BUCKET:-kalex-documents}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://10.10.190.10:15006/v1}
      - VLLM_API_KEY=${VLLM_API_KEY:-EMPTY}
      - VLLM_MODEL=${VLLM_MODEL:-glm-5}
      - VLLM_TIMEOUT_SECONDS=${VLLM_TIMEOUT_SECONDS:-120}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5173,http://10.10.190.4:13002}
      - DOCLING_OCR_ENABLED=${DOCLING_OCR_ENABLED:-true}
      - DOCLING_OCR_FORCE_FULL_PAGE=${DOCLING_OCR_FORCE_FULL_PAGE:-false}
      - DOCLING_OCR_LANGS=${DOCLING_OCR_LANGS:-eng,kor}
      - DOCLING_OCR_FALLBACK_ON_DECODE_ERROR=${DOCLING_OCR_FALLBACK_ON_DECODE_ERROR:-true}
      - DOCLING_PDF_BACKEND=${DOCLING_PDF_BACKEND:-pypdfium2}
      - DOCLING_ARTIFACTS_PATH=${DOCLING_ARTIFACTS_PATH:-/root/.cache/docling/models}
      - DOCLING_HF_DISABLE_SSL_VERIFY=${DOCLING_HF_DISABLE_SSL_VERIFY:-true}
      - DOCLING_HF_TRUST_ENV=${DOCLING_HF_TRUST_ENV:-false}
      - HF_HUB_DISABLE_XET=${HF_HUB_DISABLE_XET:-1}
    volumes:
      - docling-cache:/root/.cache/docling
      - hf-cache:/root/.cache/huggingface
    networks:
      - tabular-review-network

  # Frontend: Next.js App Router app.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://10.10.190.4:18002}
        NEXT_PUBLIC_LLM_MODEL: ${NEXT_PUBLIC_LLM_MODEL:-glm-5}
        NEXT_PUBLIC_LLM_TIMEOUT_MS: ${NEXT_PUBLIC_LLM_TIMEOUT_MS:-120000}
        # Mock toggles (per-domain falls back to global). Default mock-first.
        NEXT_PUBLIC_USE_MOCKS: ${NEXT_PUBLIC_USE_MOCKS:-true}
        NEXT_PUBLIC_USE_MOCKS_DOCUMENT_DB: ${NEXT_PUBLIC_USE_MOCKS_DOCUMENT_DB:-true}
        NEXT_PUBLIC_USE_MOCKS_CHAT: ${NEXT_PUBLIC_USE_MOCKS_CHAT:-true}
    container_name: tabular-review-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "13002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://10.10.190.4:18002}
      - NEXT_PUBLIC_LLM_MODEL=${NEXT_PUBLIC_LLM_MODEL:-glm-5}
      - NEXT_PUBLIC_LLM_TIMEOUT_MS=${NEXT_PUBLIC_LLM_TIMEOUT_MS:-120000}
      - NEXT_PUBLIC_USE_MOCKS=${NEXT_PUBLIC_USE_MOCKS:-true}
      - NEXT_PUBLIC_USE_MOCKS_DOCUMENT_DB=${NEXT_PUBLIC_USE_MOCKS_DOCUMENT_DB:-true}
      - NEXT_PUBLIC_USE_MOCKS_CHAT=${NEXT_PUBLIC_USE_MOCKS_CHAT:-true}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - tabular-review-network

networks:
  tabular-review-network:
    driver: bridge

volumes:
  docling-cache:
  hf-cache:
  pgdata:
  minio-data:
