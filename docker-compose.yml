# Docker Compose automatically loads the .env file in this directory.
# Copy .env.example to .env and adjust values before running.

services:
  # Database: PostgreSQL 16 with the pgvector extension (embeddings, BGE-M3 1024d).
  db:
    image: pgvector/pgvector:pg16
    container_name: tabular-review-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-kalex}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kalex}
      - POSTGRES_DB=${POSTGRES_DB:-kalex}
    ports:
      # Host-published port (separate from POSTGRES_PORT, which is the in-network
      # connection port = 5432). Defaults to 15432 to avoid clashing with a local pg.
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kalex} -d ${POSTGRES_DB:-kalex}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tabular-review-network

  # Object storage: MinIO (S3-compatible) for original uploaded files.
  minio:
    image: minio/minio:latest
    container_name: tabular-review-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-kalex}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-kalexsecret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tabular-review-network

  # Backend: FastAPI + Docling document conversion + vLLM proxy.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tabular-review-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "18002:8000"
    # All application config is sourced from the root .env (single source of
    # truth — no per-variable duplication here, so nothing gets missed). Any var
    # absent from .env falls back to its default in app/core/config.py.
    env_file:
      - .env
    # Overrides for values that MUST differ inside the Compose network from what
    # .env uses for host access. `environment` wins over `env_file` in Compose.
    environment:
      # Container runtime (not app config; kept out of .env).
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      # Service-to-service hostnames (.env points db/minio at localhost for host
      # access; inside the network the app must reach the service names).
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - MINIO_ENDPOINT=minio:9000
      # In-container Docling model cache path (matches the mounted volume).
      - DOCLING_ARTIFACTS_PATH=/root/.cache/docling/models
    volumes:
      - docling-cache:/root/.cache/docling
      - hf-cache:/root/.cache/huggingface
    networks:
      - tabular-review-network

  # Frontend: Next.js App Router app.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are inlined into the bundle at BUILD time, so they MUST be
      # passed as build args (env_file/runtime env is ignored by the built app).
      # Values are interpolated from the root .env (single source of truth).
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_LLM_MODEL: ${NEXT_PUBLIC_LLM_MODEL}
        NEXT_PUBLIC_LLM_TIMEOUT_MS: ${NEXT_PUBLIC_LLM_TIMEOUT_MS}
        # Mock toggles (per-domain falls back to global). "false" => real API.
        NEXT_PUBLIC_USE_MOCKS: ${NEXT_PUBLIC_USE_MOCKS}
        NEXT_PUBLIC_USE_MOCKS_DOCUMENT_DB: ${NEXT_PUBLIC_USE_MOCKS_DOCUMENT_DB}
        NEXT_PUBLIC_USE_MOCKS_CHAT: ${NEXT_PUBLIC_USE_MOCKS_CHAT}
        NEXT_PUBLIC_USE_MOCKS_REVIEW: ${NEXT_PUBLIC_USE_MOCKS_REVIEW}
    container_name: tabular-review-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "13002:3000"
    # Runtime config only. NEXT_PUBLIC_* are already baked at build time (above),
    # so they are intentionally NOT repeated here. Backend secrets stay out of
    # the frontend container by design (no env_file: .env here).
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - tabular-review-network

networks:
  tabular-review-network:
    driver: bridge

volumes:
  docling-cache:
  hf-cache:
  pgdata:
  minio-data:
