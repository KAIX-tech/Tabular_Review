# DEVELOPMENT compose: hot-reload everything.
#   - backend runs `fastapi dev` against ./backend mounted into the container.
#   - frontend runs `next dev` against ./frontend mounted into the container.
#   - db + minio run locally for a self-contained dev stack.
# For production (built images, external db/minio), use docker-compose.prod.yml:
#   docker compose -f docker-compose.prod.yml up -d --build
# Docker Compose automatically loads the .env file in this directory.
# Copy .env.example to .env and adjust values before running.

services:
  # Database: PostgreSQL 16 with the pgvector extension (embeddings, BGE-M3 1024d).
  db:
    image: pgvector/pgvector:pg16
    container_name: tabular-review-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-kalex}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kalex}
      - POSTGRES_DB=${POSTGRES_DB:-kalex}
    ports:
      # Host-published port (separate from POSTGRES_PORT, which is the in-network
      # connection port = 5432). Defaults to 15432 to avoid clashing with a local pg.
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kalex} -d ${POSTGRES_DB:-kalex}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tabular-review-network

  # Object storage: MinIO (S3-compatible) for original uploaded files.
  minio:
    image: minio/minio:latest
    container_name: tabular-review-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-kalex}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-kalexsecret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tabular-review-network

  # Backend (DEV): FastAPI hot-reload via `fastapi dev` against mounted source.
  # Reuses the production image only for its system deps (tesseract, etc.) + venv;
  # the source is bind-mounted so edits reload instantly.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tabular-review-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "18002:8000"
    # App config from the root .env (single source of truth); missing vars fall
    # back to app/core/config.py defaults.
    env_file:
      - .env
    # Only true network overrides (must differ in-network from host-facing .env).
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - MINIO_ENDPOINT=minio:9000
    volumes:
      # Bind-mount source for hot reload; keep the image's venv via an anonymous
      # volume so the host dir doesn't shadow /app/.venv.
      - ./backend:/app
      - /app/.venv
      - docling-cache:/root/.cache/docling
      - hf-cache:/root/.cache/huggingface
    # Run migrations, then start the dev server with reload on 0.0.0.0:8000.
    command:
      - /bin/sh
      - -c
      - |
        alembic upgrade head
        exec fastapi dev app/main.py --host 0.0.0.0 --port 8000
    networks:
      - tabular-review-network

  # Frontend (DEV): Next.js hot-reload via `next dev` against mounted source.
  frontend:
    image: node:20-alpine
    container_name: tabular-review-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "13002:3000"
    # NEXT_PUBLIC_* are read live by `next dev` (no build step), so pass them as
    # runtime env (interpolated from .env). Polling enables hot reload over the
    # bind mount (notably on macOS/Windows Docker).
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_LLM_MODEL=${NEXT_PUBLIC_LLM_MODEL}
      - NEXT_PUBLIC_LLM_TIMEOUT_MS=${NEXT_PUBLIC_LLM_TIMEOUT_MS}
      - NEXT_PUBLIC_USE_MOCKS=${NEXT_PUBLIC_USE_MOCKS}
      - NEXT_PUBLIC_USE_MOCKS_DOCUMENT_DB=${NEXT_PUBLIC_USE_MOCKS_DOCUMENT_DB}
      - NEXT_PUBLIC_USE_MOCKS_CHAT=${NEXT_PUBLIC_USE_MOCKS_CHAT}
      - NEXT_PUBLIC_USE_MOCKS_REVIEW=${NEXT_PUBLIC_USE_MOCKS_REVIEW}
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command:
      - /bin/sh
      - -c
      - |
        npm install -g pnpm@9
        pnpm install --frozen-lockfile
        exec pnpm dev -- -H 0.0.0.0
    networks:
      - tabular-review-network

networks:
  tabular-review-network:
    driver: bridge

volumes:
  docling-cache:
  hf-cache:
  pgdata:
  minio-data:
  frontend-node-modules:
