# PRODUCTION compose: build + run the backend and frontend as images.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Database (PostgreSQL + pgvector) and object storage (MinIO/S3) are NOT defined
# here — production points at shared/managed infrastructure. Configure the app to
# reach it via .env (POSTGRES_SERVER/PORT/credentials, MINIO_ENDPOINT/keys, ...).
# Unlike the dev compose, there are no in-network service-name overrides: every
# value comes straight from .env, so .env must be tuned for the prod targets.
#
# Docker Compose automatically loads .env for ${...} interpolation.

services:
  # Backend: built image. Default CMD runs migrations then uvicorn (see Dockerfile).
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tabular-review-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-18002}:8000"
    # All config from .env (managed db/minio hostnames included — no overrides).
    env_file:
      - .env
    # Use the host-mounted Docling models offline (air-gapped). No in-container
    # download — point Docling at the read-only bind mount below.
    environment:
      - DOCLING_ARTIFACTS_PATH=/root/.cache/docling/models
    volumes:
      # Pre-downloaded Docling models on the host (folders like
      # docling-project--docling-layout-heron / --docling-models). Populate the
      # host dir once (prefetch script or the docling-models-bundle), then this
      # read-only mount serves them — no HF access needed at runtime.
      - ${DOCLING_MODELS_HOST_PATH:-./docling-models}:/root/.cache/docling/models:ro
      - hf-cache:/root/.cache/huggingface
    networks:
      - tabular-review-network

  # Frontend: built image. NEXT_PUBLIC_* are baked at build time from .env.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${BACKEND_HOST:-http://localhost}:${BACKEND_PORT:-18002}
        NEXT_PUBLIC_LLM_MODEL: ${NEXT_PUBLIC_LLM_MODEL}
        NEXT_PUBLIC_LLM_TIMEOUT_MS: ${NEXT_PUBLIC_LLM_TIMEOUT_MS}
    container_name: tabular-review-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-13002}:3000"
    # NEXT_PUBLIC_* are already baked (above); backend secrets stay out of the
    # frontend container by design (no env_file here).
    environment:
      - NODE_ENV=production
    networks:
      - tabular-review-network

networks:
  tabular-review-network:
    driver: bridge

volumes:
  hf-cache:
