# Alembic configuration for the Kalex backend.
# The database URL is NOT set here — migrations/env.py reads it from app settings
# (Settings.database_url) so there is one source of truth for the connection.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# Migration filenames: <yyyymmdd_hhmm>_<slug> for chronological ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
